# This workflow publishes the Docker image and Helm chart when a new tag is pushed.
name: 🚀 Publish image & helm

# Triggered on a push event for any tag.
on:
  push:
    tags:
      - "*"

jobs:
  # ============================================
  # Go Operator Docker Image
  # ============================================
  publish-image:
    name: 🐳 Publish image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # Required for uploading release assets
    env:
      DOCKER_IMAGE: lotest/locust-k8s-operator
    steps:
      - name: 📂 Checkout repo
        uses: actions/checkout@v6

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: 🔧 Setup ko
        uses: ko-build/setup-ko@v0.9

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 📦 Build and push with ko
        env:
          KO_DOCKER_REPO: ${{ env.DOCKER_IMAGE }}
        run: |
          ko build ./cmd \
            --platform=linux/amd64,linux/arm64 \
            --bare \
            --tags=${{ github.ref_name }},latest

      - name: 📋 Generate SBOM (SPDX format)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
          format: spdx-json
          output: sbom-spdx.json

      - name: 📋 Generate SBOM (CycloneDX format)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
          format: cyclonedx
          output: sbom-cyclonedx.json

      - name: 📦 Upload SBOMs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-spdx.json
            sbom-cyclonedx.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm-chart-release:
    name: 🌊 Publish Helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [publish-image]
    permissions:
      contents: write
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ✍️ Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: 🌊 Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: 📦 Custom packaging
        run: |
          VERSION=${{github.ref_name}}
          rm -rf .cr-release-packages
          mkdir -p .cr-release-packages
          helm package charts/locust-k8s-operator --app-version=${VERSION} --version=${VERSION} --destination=.cr-release-packages

      # Pin to v1.5.0 - last stable version with skip_packaging before v1.6.0 bug
      # v1.6.0 introduced latest_tag scope bug: https://github.com/helm/chart-releaser-action/issues/171
      - name: 🎉 Run chart-releaser
        uses: helm/chart-releaser-action@v1.5.0
        with:
          skip_packaging: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  docs-release:
    name: 📚 Publish documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 Setup python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: 📦 Install dependencies
        run: |
          pip install \
          mkdocs-material \
          mkdocs-git-revision-date-localized-plugin \
          mkdocs-minify-plugin

      - name: 🚀 Build documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m mkdocs build

      - name: 📝 Copy Artifact Hub metadata
        run: |
          cp artifacthub-repo.yml ./site/

      - name: 🚀 Deploy documentation
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
          user_name: ${{ github.actor }}
          user_email: ${{ github.actor }}@users.noreply.github.com
