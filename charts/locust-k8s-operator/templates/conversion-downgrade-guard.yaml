{{/*
=============================================================================
CONVERSION DOWNGRADE GUARD (helm pre-upgrade hook)
=============================================================================
Renders only when webhook.enabled=false. If a previous install of this chart
ran with webhook.enabled=true, the CRD shipped a spec.conversion block that
allowed v1 LocustTest resources to be served at v2. Removing that block on a
helm upgrade — i.e. flipping webhook.enabled from true to false — makes any
v1-encoded object in etcd unreadable through the v2 served version.

This hook runs `kubectl get crd ... -o jsonpath='{.status.storedVersions}'`
before the upgrade applies. If "v1" is in storedVersions the hook fails the
upgrade with an actionable message pointing at the migration guide.

The hook is harmless on:
  - Fresh installs: the CRD doesn't exist yet → kubectl returns nothing → pass.
  - Upgrades where webhook.enabled stays false: storedVersions has only v2
    (the chart never wrote v1 in that mode) → pass.

Lifecycle:
  - helm.sh/hook: pre-upgrade,pre-install — runs before main resources apply.
  - helm.sh/hook-weight: -10 — must run before the CRD itself is reconciled.
  - helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded — keep on
    failure so users can read the failed Pod logs; recreate cleanly next try.

The hook ServiceAccount/ClusterRole are scoped to GET on a single named CRD,
which is the minimum needed.
=============================================================================
*/}}
{{- if and (not .Values.webhook.enabled) .Values.webhook.conversionDowngradeGuard.enabled -}}
{{- $name := printf "%s-conversion-guard" (include "locust-k8s-operator.fullname" .) -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "locust-k8s-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "locust-k8s-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  # Read CRD storedVersions only on the one resource we care about.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    resourceNames: ["locusttests.locust.io"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "locust-k8s-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "locust-k8s-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "locust-k8s-operator.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ $name }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: check
          image: {{ .Values.webhook.conversionDowngradeGuard.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              CRD=locusttests.locust.io
              # If the CRD doesn't exist yet (fresh install), nothing to check.
              if ! kubectl get crd "$CRD" >/dev/null 2>&1; then
                echo "OK: CRD $CRD not present — fresh install, no v1 objects possible."
                exit 0
              fi
              STORED=$(kubectl get crd "$CRD" -o jsonpath='{.status.storedVersions}')
              echo "CRD $CRD storedVersions: $STORED"
              case "$STORED" in
                *v1*)
                  cat <<'EOF'
              ERROR: webhook.enabled is being set to false, but the LocustTest
              CRD still has v1 in storedVersions. Disabling the webhook removes
              the v1->v2 conversion route, which would make those objects
              unreadable.

              Resolve before retrying:
                1. kubectl get locusttests.locust.io -A -o yaml | kubectl replace --force -f -
                2. kubectl patch crd locusttests.locust.io --subresource status \
                     --type=merge -p '{"status":{"storedVersions":["v2"]}}'
                3. Verify: kubectl get crd locusttests.locust.io \
                     -o jsonpath='{.status.storedVersions}'  # should print ["v2"]

              See the migration guide:
              https://abdelrhmanhamouda.github.io/locust-k8s-operator/migration/#switching-webhookenabled-from-true-to-false-crd-downgrade

              To bypass this guard (e.g. you accept the data loss):
                helm upgrade ... --set webhook.conversionDowngradeGuard.enabled=false
              EOF
                  exit 1
                  ;;
              esac
              echo "OK: only v2 in storedVersions, safe to disable webhook."
{{- end }}
